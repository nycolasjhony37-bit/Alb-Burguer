<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Alb'Burguer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        .checkout-container { display: grid; grid-template-columns: 1.5fr 1fr; gap: 3rem; padding: 5rem 0; }
        .checkout-box { background: white; padding: 2rem; border-radius: 20px; box-shadow: var(--shadow); }
        .checkout-title { margin-bottom: 2rem; font-size: 1.8rem; }
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid #eee; }
        .pix-box { background: #fdfdfd; border: 2px dashed var(--primary); padding: 2rem; border-radius: 15px; text-align: center; margin-top: 2rem; }
        .pix-key { background: #eee; padding: 1rem; border-radius: 10px; font-family: monospace; word-break: break-all; margin: 1rem 0; cursor: pointer; }
        .pix-key:active { background: #ddd; }
    </style>
</head>
<body>
    <header id="header" class="scrolled">
        <nav class="container">
            <div class="logo-container">
                <a href="index.html">
                    <img src="logo.png" alt="Alb'Burguer" class="logo-img">
                </a>
            </div>
            <div class="nav-actions">
                <a href="index.html" class="btn btn-outline">Voltar ao Cardápio</a>
            </div>
        </nav>
    </header>

    <div class="container checkout-container">
        <!-- Delivery Info -->
        <div class="checkout-box">
            <h2 class="checkout-title">Dados para Entrega</h2>
            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" id="cust-name" placeholder="Seu nome">
            </div>
            <div class="form-group">
                <label>WhatsApp</label>
                <input type="text" id="cust-phone" placeholder="(00) 00000-0000">
            </div>
            <div class="form-group">
                <label>Endereço Completo</label>
                <textarea id="cust-addr" placeholder="Rua, número, complemento e bairro"></textarea>
            </div>
            
            <h2 class="checkout-title" style="margin-top: 3rem;">Pagamento PIX</h2>
            <p>Escaneie o QR Code ou copie a chave abaixo para realizar o pagamento.</p>
            <div class="pix-box">
                <div id="qrcode" style="width: 200px; height: 200px; background: #eee; margin: 0 auto 1.5rem; display: flex; align-items: center; justify-content: center;">
                    <i data-lucide="qr-code" size="100" color="#ccc"></i>
                </div>
                <p>Chave PIX (CNPJ/E-mail):</p>
                <div class="pix-key" onclick="copyPix()">12.345.678/0001-90</div>
                <small>Clique para copiar a chave</small>
            </div>

            <button id="finish-order" class="btn btn-primary btn-block" style="margin-top: 2rem;">Confirmar e Enviar Pedido</button>
        </div>

        <!-- Order Summary -->
        <div class="checkout-box" style="height: fit-content;">
            <h2 class="checkout-title">Resumo do Pedido</h2>
            <div id="summary-list">
                <!-- Items injected here -->
            </div>
            <div class="total" style="margin-top: 2rem; border-top: 2px solid #eee; padding-top: 1rem;">
                <span>Total:</span>
                <span id="final-total" style="color: var(--primary); font-size: 1.5rem; font-weight: 800;">R$ 0,00</span>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            const cart = JSON.parse(sessionStorage.getItem('alb_cart')) || [];
            const summaryList = document.getElementById('summary-list');
            const finalTotal = document.getElementById('final-total');

            if (cart.length === 0) {
                alert('Seu carrinho está vazio!');
                window.location.href = 'index.html';
                return;
            }

            summaryList.innerHTML = cart.map(item => `
                <div class="summary-item">
                    <span>${item.name}</span>
                    <span>R$ ${item.price.toFixed(2).replace('.', ',')}</span>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + item.price, 0);
            finalTotal.textContent = `R$ ${total.toFixed(2).replace('.', ',')}`;

            window.copyPix = () => {
                const key = '12.345.678/0001-90';
                navigator.clipboard.writeText(key).then(() => {
                    alert('Chave PIX copiada!');
                });
            };

            document.getElementById('finish-order').addEventListener('click', () => {
                const name = document.getElementById('cust-name').value;
                const phone = document.getElementById('cust-phone').value;
                const addr = document.getElementById('cust-addr').value;

                if (!name || !phone || !addr) {
                    alert('Por favor, preencha todos os dados de entrega!');
                    return;
                }

                // In a real app, this would send to a server. 
                // For now, we simulate success and maybe open WhatsApp with the order details.
                const message = `Olá Alb'Burguer! Novo pedido de ${name}.\nItens: ${cart.map(i => i.name).join(', ')}\nTotal: R$ ${total.toFixed(2)}\nEndereço: ${addr}`;
                const waLink = `https://wa.me/5521999998888?text=${encodeURIComponent(message)}`;
                
                alert('Pedido confirmado! Redirecionando para o WhatsApp do Alb'Burguer...');
                
                // Analytics: Track Checkout
                const stats = JSON.parse(localStorage.getItem('alb_stats')) || { views: 0, clicks: 0, checkouts: 0 };
                stats.checkouts++;
                localStorage.setItem('alb_stats', JSON.stringify(stats));

                sessionStorage.removeItem('alb_cart');
                window.location.href = waLink;
            });
        });
    </script>
</body>
</html>
